<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanks — Global Security & Intelligence Brief</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d0d;
            color: #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 24px;
        }
        .card {
            max-width: 500px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 48px 32px;
        }
        .icon { font-size: 3rem; margin-bottom: 16px; display: block; }
        h1 { font-size: 1.5rem; margin-bottom: 12px; }
        p { color: #999; line-height: 1.7; margin-bottom: 24px; font-size: 0.95rem; }
        .badge {
            display: inline-block;
            border: 1px solid #2a2a2a;
            border-radius: 100px;
            padding: 6px 16px;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #c9a84c;
            font-family: monospace;
            margin-bottom: 24px;
        }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: #c9a84c;
            color: #0d0d0d;
            font-weight: 600;
            border-radius: 6px;
            font-size: 14px;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn:hover { background: #dbb956; }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">TREVOR Assessment</div>
        <span class="icon">✓</span>
        <h1>You're on the list</h1>
        <p>Check your inbox for tomorrow's edition. If you don't see it within 15 minutes of 07:00 PT, check your spam folder and add <strong>trevor_mentis@agentmail.to</strong> to your contacts.</p>
        <a href="/" class="btn">Back to Home</a>
    </div>
</body>
</html>
